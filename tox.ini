[tox]
requires =
    tox>=4
env_list = lint, format, typecheck, test

# ──────────────────────────────────────────────
# Lint — check code style without modifying files
# ──────────────────────────────────────────────
[testenv:lint]
description = Check code style with ruff
skip_install = true
deps = ruff>=0.9.0
commands =
    ruff check src/ tests/

# ──────────────────────────────────────────────
# Format — auto-format code + fix lint issues
# ──────────────────────────────────────────────
[testenv:format]
description = Auto-format code with ruff
skip_install = true
deps = ruff>=0.9.0
commands =
    ruff format src/ tests/
    ruff check --fix src/ tests/

# ──────────────────────────────────────────────
# Type check — static type analysis
# ──────────────────────────────────────────────
[testenv:typecheck]
description = Run mypy type checker
deps =
    mypy>=1.13
    torch>=2.10
    pandas-stubs
    types-Pillow
    types-tqdm
    types-tabulate
commands =
    mypy src/

# ──────────────────────────────────────────────
# Test — run pytest with coverage
# ──────────────────────────────────────────────
[testenv:test]
description = Run tests with pytest
deps =
    pytest>=8.0
    pytest-cov>=5.0
commands =
    pytest tests/ -v --tb=short --cov=src --cov-report=term-missing
